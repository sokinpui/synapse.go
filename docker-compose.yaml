services:
  synapse:
    build: .
    image: synapse
    container_name: synapse
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # deploy locally, require v2ray proxy to use gemini api
      - http_proxy=http://host.docker.internal:1087
      - https_proxy=http://host.docker.internal:1087
      - ALL_PROXY=socks5://host.docker.internal:1080
      - GENAI_API_KEYS=${GENAI_API_KEYS}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    restart: unless-stopped
